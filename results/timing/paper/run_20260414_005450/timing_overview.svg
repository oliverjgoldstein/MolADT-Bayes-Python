mily="Menlo, Consolas, monospace" fill="#111827">961.0 mol/s</text><text x="576" y="604" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">count 250000; success 250000/250000; failures 0; runtime 260.148s; median 899.7 us; p95 1651.4 us</text><rect x="48" y="550" width="88" height="18" rx="3" fill="#0f766e" opacity="0.12" /><text x="92.0" y="562" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#0f766e" font-weight="600">Local stage</text><text x="48" y="586" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="600">smiles_parse_sanitize</text><text x="48" y="602" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">stage key: smiles_parse_sanitize</text><text x="48" y="618" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">An external chemistry toolkit parses each SMILES</text><text x="48" y="631" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">string and sanitizes the molecular graph for the</text><rect x="576" y="566" width="574" height="16" rx="0" fill="#eef2f7" /><rect x="576" y="566" width="314.8" height="16" rx="0" fill="#0f766e" opacity="0.92" /><text x="1164" y="579" font-size="12" font-family="Menlo, Consolas, monospace" fill="#111827">15627.9 mol/s</text><text x="576" y="604" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">count 250000; success 250000/250000; failures 0; runtime 15.997s; median 54.9 us; p95 83.6 us</text><rect x="48" y="550" width="88" height="18" rx="3" fill="#0f766e" opacity="0.12" /><text x="92.0" y="562" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#0f766e" font-weight="600">Local stage</text><text x="48" y="586" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="600">timing_library_prepare</text><text x="48" y="602" font-size="10" font-family="Helvetica, Arial, sans-serif" fill=