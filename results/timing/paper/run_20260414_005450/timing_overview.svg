<svg xmlns="http://www.w3.org/2000/svg" width="1268" height="908" viewBox="0 0 1268 908" role="img" aria-label="Benchmark overview"><rect width="1268" height="908" fill="#ffffff" /><rect x="24" y="24" width="1220" height="860" rx="4" fill="#ffffff" stroke="#cbd5e1" /><text x="48" y="60" font-size="24" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="700">Local timing overview</text><text x="48" y="86" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">This chart separates source SMILES I/O, source SMILES parsing, cached MolADT JSON I/O, and cached MolADT</text><text x="48" y="102" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">JSON decoding.</text><text x="576" y="132" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="600">Throughput (molecules / second, log scale; farther right is faster)</text><line x1="576.0" y1="156" x2="576.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="576.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">100</text><line x1="719.5" y1="156" x2="719.5" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="719.5" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">1k</text><line x1="863.0" y1="156" x2="863.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="863.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">10k</text><line x1="1006.5" y1="156" x2="1006.5" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="1006.5" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">100k</text><line x1="1150.0" y1="156" x2="1150.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="1150.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">1M</text><rect x="48" y="454" width="108" height="18" rx="3" fill="#be123c" opacity="0.12" /><text x="102.0" y="466" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#be123c" font-weight="600">Our file reader</text><text x="48" y="490" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="600">MolADT JSON to object</text><text x="48" y="506" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">stage key: moladt_file_parse</text><text x="48" y="522" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">Decodes the cached MolADT JSON payload into the</text><text x="48" y="535" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">local typed molecule object.</text><rect x="576" y="470" width="574" height="16" rx="0" fill="#eef2f7" /><rect x="576" y="470" width="156.3" height="16" rx="0" fill="#be123c" opacity="0.92" /><text x="1164" y="483" font-size="12" font-family="Menlo, Consolas, monospace" fill="#111827">1228.7 mol/s</text><text x="576" y="508" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">count 250000; success 250000/250000; failures 0; runtime 203.472s; median 329.7 us; p95 1086.6 us</text><rect x="48" y="550" width="88" height="18" rx="3" fill="#0f766e" opacity="0.12" /><text x="92.0" y="562" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#0f766e" font-weight="600">Local stage</text><text x="48" y="586" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="600">raw_file_read</text><text x="48" y="602" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">stage key: raw_file_read</text><text x="48" y="618" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">Read SMILES strings from the normalized ZINC source</text><text x="48" y="631" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">file without chemistry work.</text><