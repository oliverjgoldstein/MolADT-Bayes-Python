<svg xmlns="http://www.w3.org/2000/svg" width="1268" height="908" viewBox="0 0 1268 908" role="img" aria-label="Benchmark overview"><rect width="1268" height="908" fill="#fcfbf7" /><rect x="24" y="24" width="1220" height="860" rx="18" fill="#ffffff" stroke="#d6d3d1" /><text x="48" y="60" font-size="24" font-family="Georgia, serif" fill="#1f2937">Local timing overview</text><text x="48" y="86" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">This chart separates raw I/O, optional external-toolkit normalization, plain string baselines, and the local</text><text x="48" y="102" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">MolADT parser and file-reader stages.</text><text x="576" y="132" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">Throughput (molecules / second, log scale; farther right is faster)</text><line x1="576.0" y1="156" x2="576.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="576.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">100</text><line x1="719.5" y1="156" x2="719.5" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="719.5" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">1k</text><line x1="863.0" y1="156" x2="863.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="863.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">10k</text><line x1="1006.5" y1="156" x2="1006.5" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="1006.5" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">100k</text><line x1="1150.0" y1="156" x2="1150.0" y2="860" stroke="#d1d5db" stroke-width="1" /><text x="1150.0" y="148" text-anchor="middle" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">1M</text><rect x="48" y="166" width="90" height="18" rx="9" fill="#1d4ed8" opacity="0.12" /><text x="93.0" y="178" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#1d4ed8" font-weight="600">I/O baseline</text><text x="48" y="202" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">Source file read</text><text x="48" y="218" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: raw_file_read</text><text x="48" y="234" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">Reads raw SMILES lines from the normalized source</text><text x="48" y="247" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">file. No chemistry, parsing, or validation happens</text><rect x="576" y="182" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="182" width="526.4" height="16" rx="8" fill="#1d4ed8" opacity="0.92" /><text x="1164" y="195" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">465577.0 mol/s</text><text x="576" y="220" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 0.537s; median 0.1 us; p95 0.2 us</text><rect x="48" y="262" width="114" height="18" rx="9" fill="#b45309" opacity="0.12" /><text x="105.0" y="274" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#b45309" font-weight="600">External toolkit</text><text x="48" y="298" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">Toolkit parse + sanitize</text><text x="48" y="314" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: smiles_parse_sanitize</text><text x="48" y="330" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">An external chemistry toolkit parses each SMILES</text><text x="48" y="343" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">string into a molecular graph and applies its</text><rect x="576" y="278" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="278" width="314.8" height="16" rx="8" fill="#b45309" opacity="0.92" /><text x="1164" y="291" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">15627.9 mol/s</text><text x="576" y="316" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 15.997s; median 54.9 us; p95 83.6 us</text><rect x="48" y="358" width="114" height="18" rx="9" fill="#b45309" opacity="0.12" /><text x="105.0" y="370" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#b45309" font-weight="600">External toolkit</text><text x="48" y="394" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">Toolkit canonical SMILES</text><text x="48" y="410" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: smiles_canonicalization</text><text x="48" y="426" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">The same external toolkit rewrites each parsed</text><text x="48" y="439" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">molecule into one canonical SMILES form.</text><rect x="576" y="374" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="374" width="349.7" height="16" rx="8" fill="#b45309" opacity="0.92" /><text x="1164" y="387" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">27362.8 mol/s</text><text x="576" y="412" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 9.136s; median 31.2 us; p95 43.0 us</text><rect x="48" y="454" width="102" height="18" rx="9" fill="#475569" opacity="0.12" /><text x="99.0" y="466" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#475569" font-weight="600">One-time setup</text><text x="48" y="490" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">Matched corpus build</text><text x="48" y="506" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: timing_library_prepare</text><text x="48" y="522" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">Builds the aligned timing corpus so every later</text><text x="48" y="535" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage runs on the same molecules and file count.</text><rect x="576" y="470" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="470" width="78.2" height="16" rx="8" fill="#475569" opacity="0.92" /><text x="1164" y="483" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">350.9 mol/s</text><text x="576" y="508" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 712.353s; median 2437.1 us; p95 4554.8 us</text><rect x="48" y="550" width="108" height="18" rx="9" fill="#6d28d9" opacity="0.12" /><text x="102.0" y="562" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6d28d9" font-weight="600">String baseline</text><text x="48" y="586" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">CSV field to string</text><text x="48" y="602" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: smiles_csv_string_parse</text><text x="48" y="618" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">Materializes the canonical SMILES field from the</text><text x="48" y="631" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">manifest CSV as a plain Python string. This is the</text><rect x="576" y="566" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="566" width="487.0" height="16" rx="8" fill="#6d28d9" opacity="0.92" /><text x="1164" y="579" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">247661.8 mol/s</text><text x="576" y="604" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 1.009s; median 0.2 us; p95 0.3 us</text><rect x="48" y="646" width="88" height="18" rx="9" fill="#0f766e" opacity="0.12" /><text x="92.0" y="658" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#0f766e" font-weight="600">Our parser</text><text x="48" y="682" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">SMILES to MolADT</text><text x="48" y="698" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: smiles_library_parse</text><text x="48" y="714" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">Runs the local MolADT SMILES parser on those same</text><text x="48" y="727" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">canonical strings to build the typed molecule</text><rect x="576" y="662" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="662" width="141.0" height="16" rx="8" fill="#0f766e" opacity="0.92" /><text x="1164" y="675" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">961.0 mol/s</text><text x="576" y="700" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 260.148s; median 899.7 us; p95 1651.4 us</text><rect x="48" y="742" width="108" height="18" rx="9" fill="#be123c" opacity="0.12" /><text x="102.0" y="754" text-anchor="middle" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#be123c" font-weight="600">Our file reader</text><text x="48" y="778" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1f2937" font-weight="600">MolADT JSON to object</text><text x="48" y="794" font-size="10" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">stage key: moladt_file_parse</text><text x="48" y="810" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">Reads the already-structured MolADT JSON file and</text><text x="48" y="823" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">reconstructs the local typed molecule object from</text><rect x="576" y="758" width="574" height="16" rx="8" fill="#ece9e1" /><rect x="576" y="758" width="156.3" height="16" rx="8" fill="#be123c" opacity="0.92" /><text x="1164" y="771" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1f2937">1228.7 mol/s</text><text x="576" y="796" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#6b7280">count 250000; success 250000/250000; failures 0; runtime 203.472s; median 329.7 us; p95 1086.6 us</text></svg>
