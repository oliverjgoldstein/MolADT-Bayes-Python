<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" role="img" aria-label="Benchmark overview"><rect width="900" height="580" fill="#ffffff" /><rect x="28" y="28" width="844" height="524" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" /><text x="56" y="68" font-size="34" font-family="Helvetica, Arial, sans-serif" fill="#111827" font-weight="700">QM9: MAE</text><text x="56" y="96" font-size="17" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">Local MolADT benchmark run on the QM9 split. Bars show training, test, and the cited</text><text x="56" y="114" font-size="17" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">MoleculeNet Table 3 baseline.</text><text x="56" y="142" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">Local: moladt_featurized_geom / visnet_ensemble / deep_ensemble</text><text x="56" y="165" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">Selection: Validation MAE; paper baseline: DTNN from MoleculeNet</text><line x1="100" y1="454.0" x2="844" y2="454.0" stroke="#d1d5db" stroke-width="1" /><text x="88" y="459.0" text-anchor="end" font-size="12" font-family="Menlo, Consolas, monospace" fill="#4b5563">0.00</text><line x1="100" y1="405.2" x2="844" y2="405.2" stroke="#d1d5db" stroke-width="1" /><text x="88" y="410.2" text-anchor="end" font-size="12" font-family="Menlo, Consolas, monospace" fill="#4b5563">0.56</text><line x1="100" y1="356.4" x2="844" y2="356.4" stroke="#d1d5db" stroke-width="1" /><text x="88" y="361.4" text-anchor="end" font-size="12" font-family="Menlo, Consolas, monospace" fill="#4b5563">1.13</text><line x1="100" y1="307.6" x2="844" y2="307.6" stroke="#d1d5db" stroke-width="1" /><text x="88" y="312.6" text-anchor="end" font-size="12" font-family="Menlo, Consolas, monospace" fill="#4b5563">1.69</text><line x1="100" y1="258.8" x2="844" y2="258.8" stroke="#d1d5db" stroke-width="1" /><text x="88" y="263.8" text-anchor="end" font-